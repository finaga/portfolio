/* ── SVG Area Chart (pure, no lib) ──────────────── */
const AreaChartSVG = ({ data, width=700, height=200 }) => {
  const W = width, H = height;
  const pad = { t:12, r:8, b:32, l:44 };
  const iW = W - pad.l - pad.r;
  const iH = H - pad.t - pad.b;
  const maxVal = Math.max(...data.map(d => d.solar + d.wind + d.hydro)) * 1.1;
  const xStep = iW / (data.length - 1);
  const scaleY = v => iH - (v / maxVal) * iH;

  const polyline = (arr) => arr.map((v,i) => `${pad.l + i * xStep},${pad.t + scaleY(v)}`).join(' ');
  const area = (arr) => {
    const pts = arr.map((v,i) => `${pad.l + i * xStep},${pad.t + scaleY(v)}`).join(' ');
    return `M ${pad.l},${pad.t + iH} L ${pts.split(' ').map(p => p).join(' L ')} L ${pad.l + iW},${pad.t + iH} Z`;
  };

  // stacked
  const solarVals  = data.map(d => d.solar);
  const windVals   = data.map(d => d.solar + d.wind);
  const hydroVals  = data.map(d => d.solar + d.wind + d.hydro);

  const makeAreaPath = (topVals, botVals) => {
    const top = topVals.map((v,i) => [pad.l + i*xStep, pad.t + scaleY(v)]);
    const bot = botVals ? botVals.map((v,i) => [pad.l + i*xStep, pad.t + scaleY(v)]).reverse() : [[pad.l + iW, pad.t + iH],[pad.l, pad.t + iH]];
    return `M ${top.map(p=>p.join(',')).join(' L ')} L ${bot.map(p=>p.join(',')).join(' L ')} Z`;
  };

  const makeLine = (vals) => vals.map((v,i)=>`${i===0?'M':'L'} ${pad.l + i*xStep},${pad.t + scaleY(v)}`).join(' ');

  // Y axis ticks
  const yTicks = [0, 400, 800, 1200, 1600];
  // X axis — every 4 hours
  const xTicks = data.filter((_,i) => i % 4 === 0);

  const [tooltip, setTooltip] = useState(null);

  return (
    <div style={{position:'relative', width:'100%'}}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%', height:'auto', display:'block'}} preserveAspectRatio="xMidYMid meet"
        onMouseMove={e => {
          const rect = e.currentTarget.getBoundingClientRect();
          const svgX = ((e.clientX - rect.left) / rect.width) * W;
          const idx = Math.round((svgX - pad.l) / xStep);
          if(idx >= 0 && idx < data.length) setTooltip({idx, x: svgX / W * 100});
        }}
        onMouseLeave={() => setTooltip(null)}>
        <defs>
          <linearGradient id="gHydro" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#6366F1" stopOpacity="0.5"/>
            <stop offset="100%" stopColor="#6366F1" stopOpacity="0.05"/>
          </linearGradient>
          <linearGradient id="gWind" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#38BDF8" stopOpacity="0.5"/>
            <stop offset="100%" stopColor="#38BDF8" stopOpacity="0.05"/>
          </linearGradient>
          <linearGradient id="gSolar" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#F59E0B" stopOpacity="0.6"/>
            <stop offset="100%" stopColor="#F59E0B" stopOpacity="0.05"/>
          </linearGradient>
        </defs>

        {/* Grid lines */}
        {yTicks.map(v => (
          <g key={v}>
            <line x1={pad.l} x2={pad.l+iW} y1={pad.t+scaleY(v)} y2={pad.t+scaleY(v)} stroke="#1E3A52" strokeWidth="0.8"/>
            <text x={pad.l-6} y={pad.t+scaleY(v)+4} textAnchor="end" fontSize="9" fill="#475569">{v}</text>
          </g>
        ))}

        {/* Areas (stacked: hydro on top, then wind, then solar at base) */}
        <path d={makeAreaPath(hydroVals, windVals)} fill="url(#gHydro)" />
        <path d={makeAreaPath(windVals, solarVals)} fill="url(#gWind)" />
        <path d={makeAreaPath(solarVals, null)} fill="url(#gSolar)" />

        {/* Lines */}
        <path d={makeLine(hydroVals)} fill="none" stroke="#6366F1" strokeWidth="1.5"/>
        <path d={makeLine(windVals)}  fill="none" stroke="#38BDF8" strokeWidth="1.5"/>
        <path d={makeLine(solarVals)} fill="none" stroke="#F59E0B" strokeWidth="2"/>

        {/* X axis labels */}
        {xTicks.map((d,i) => {
          const origIdx = data.indexOf(d);
          return (
            <text key={i} x={pad.l + origIdx*xStep} y={H - 6} textAnchor="middle" fontSize="9" fill="#475569">{d.label}</text>
          );
        })}

        {/* Hover line + dots */}
        {tooltip && tooltip.idx >= 0 && tooltip.idx < data.length && (() => {
          const d = data[tooltip.idx];
          const x = pad.l + tooltip.idx * xStep;
          return (
            <>
              <line x1={x} x2={x} y1={pad.t} y2={pad.t+iH} stroke="#475569" strokeWidth="1" strokeDasharray="3 3"/>
              <circle cx={x} cy={pad.t + scaleY(d.solar)} r="3" fill="#F59E0B" />
              <circle cx={x} cy={pad.t + scaleY(d.solar+d.wind)} r="3" fill="#38BDF8" />
              <circle cx={x} cy={pad.t + scaleY(d.solar+d.wind+d.hydro)} r="3" fill="#6366F1" />
            </>
          );
        })()}
      </svg>
      {tooltip && tooltip.idx >= 0 && tooltip.idx < data.length && (
        <div style={{
          position:'absolute', top:4, left:`${Math.min(Math.max(tooltip.x, 15), 85)}%`,
          transform:'translateX(-50%)',
          background:'#1E293B', border:'1px solid #334155', borderRadius:8,
          padding:'8px 12px', pointerEvents:'none', zIndex:10,
          boxShadow:'0 8px 24px rgba(0,0,0,0.5)', fontSize:11, whiteSpace:'nowrap',
        }}>
          <div style={{color:'#94A3B8', marginBottom:6, fontWeight:600}}>{data[tooltip.idx].label}</div>
          {[
            {label:'Solar', val:data[tooltip.idx].solar, color:'#F59E0B'},
            {label:'Wind',  val:data[tooltip.idx].wind,  color:'#38BDF8'},
            {label:'Hydro', val:data[tooltip.idx].hydro, color:'#6366F1'},
          ].map(r=>(
            <div key={r.label} style={{display:'flex', alignItems:'center', gap:8, marginBottom:3}}>
              <div style={{width:7,height:7,borderRadius:2,background:r.color,flexShrink:0}}/>
              <span style={{color:'#94A3B8', minWidth:36}}>{r.label}</span>
              <span style={{color:'#F8FAFC', fontWeight:700, marginLeft:'auto', fontVariantNumeric:'tabular-nums'}}>{r.val} MW</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

/* ── Weekly Bar Chart ────────────────────────────── */
const WeeklyBarChart = ({ data }) => {
  const max = Math.max(...data.map(d => d.output)) * 1.1;
  const target = data[0].target;
  const targetPct = (target / max) * 100;

  return (
    <div style={{display:'flex', flexDirection:'column', gap:0}}>
      <div style={{display:'flex', alignItems:'flex-end', gap:8, height:140, position:'relative', padding:'0 4px'}}>
        {/* Target line */}
        <div style={{
          position:'absolute', left:0, right:0,
          bottom: `${(target/max)*140}px`,
          borderTop:'1.5px dashed #475569', zIndex:2,
          display:'flex', alignItems:'center', justifyContent:'flex-end',
        }}>
          <span style={{background:'#1E293B', color:'#64748B', fontSize:9, padding:'1px 4px', borderRadius:3, marginRight:4}}>Target {(target/1000).toFixed(1)}k</span>
        </div>
        {data.map((d,i) => {
          const h = Math.round((d.output / max) * 140);
          const above = d.output >= target;
          return (
            <div key={i} style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:4}}>
              <div style={{width:'100%', height:`${h}px`, borderRadius:'4px 4px 0 0',
                background: above
                  ? 'linear-gradient(180deg,#10B981,#059669)'
                  : 'linear-gradient(180deg,#065F46,#064E3B)',
                opacity: above ? 1 : 0.8,
                transition:'all 200ms',
              }}/>
            </div>
          );
        })}
      </div>
      <div style={{display:'flex', gap:8, padding:'6px 4px 0'}}>
        {data.map((d,i)=>(
          <div key={i} style={{flex:1, textAlign:'center', fontSize:10, color:'#64748B'}}>{d.day}</div>
        ))}
      </div>
    </div>
  );
};

/* ── Fleet Health Ring ───────────────────────────── */
const FleetRing = ({ pct, size=100 }) => {
  const r = 38, cx = 50, cy = 50;
  const circ = 2 * Math.PI * r;
  const dash = (circ * pct) / 100;
  return (
    <svg width={size} height={size} viewBox="0 0 100 100">
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#1E3A52" strokeWidth="10"/>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#10B981" strokeWidth="10"
        strokeDasharray={`${dash} ${circ - dash}`}
        strokeLinecap="round"
        transform="rotate(-90 50 50)"
        style={{filter:'drop-shadow(0 0 4px rgba(16,185,129,0.4))'}}
      />
      <text x={cx} y={cy-4} textAnchor="middle" fontSize="16" fontWeight="700" fill="#10B981" fontFamily="Inter">{pct}%</text>
      <text x={cx} y={cy+10} textAnchor="middle" fontSize="8" fill="#64748B" fontFamily="Inter">healthy</text>
    </svg>
  );
};

/* ── Sparkline ───────────────────────────────────── */
const Spark = ({ data, color='#10B981' }) => {
  const max = Math.max(...data);
  return (
    <div style={{display:'flex', alignItems:'flex-end', gap:2, height:22}}>
      {data.map((v,i)=>(
        <div key={i} style={{
          width:4, borderRadius:2, flexShrink:0,
          height:`${Math.max(3,(v/Math.max(max,1))*22)}px`,
          background:color, opacity:0.75,
        }}/>
      ))}
    </div>
  );
};

/* ── KPI Card ────────────────────────────────────── */
const KpiCard = ({ label, value, unit, sub, change, changeDir, changeNote, iconName, accent }) => {
  const accentCls = `kpi-accent-${accent}`;
  const iconColors = {green:'#10B981', gold:'#F59E0B', sky:'#38BDF8', purple:'#A78BFA', red:'#EF4444'};
  const iconBgs    = {green:'rgba(16,185,129,.1)', gold:'rgba(245,158,11,.1)', sky:'rgba(56,189,248,.1)', purple:'rgba(167,139,250,.1)', red:'rgba(239,68,68,.1)'};
  const ic = iconColors[accent] || '#94A3B8';
  const ibg = iconBgs[accent] || 'rgba(148,163,184,.1)';
  return (
    <div className={`card ${accentCls}`} style={{padding:20, display:'flex', flexDirection:'column', gap:14, position:'relative', overflow:'hidden'}}>
      <div style={{display:'flex', alignItems:'flex-start', justifyContent:'space-between'}}>
        <span style={{fontSize:10, fontWeight:600, color:'#64748B', textTransform:'uppercase', letterSpacing:'0.1em'}}>{label}</span>
        <div style={{borderRadius:8, padding:'6px 7px', background:ibg}}>
          <Ic n={iconName} size={15} color={ic} />
        </div>
      </div>
      <div>
        <div style={{display:'flex', alignItems:'baseline', gap:5}}>
          <span className="tnum" style={{fontSize:30, fontWeight:800, color:C.text, letterSpacing:'-0.03em', lineHeight:1}}>{value}</span>
          {unit && <span style={{fontSize:13, fontWeight:500, color:'#64748B'}}>{unit}</span>}
        </div>
        {sub && <p style={{fontSize:11, color:'#64748B', marginTop:4}}>{sub}</p>}
      </div>
      {change && (
        <div style={{display:'flex', alignItems:'center', gap:5}}>
          <span style={{
            display:'flex', alignItems:'center', gap:3, fontSize:11, fontWeight:700,
            color: changeDir==='up' ? '#10B981' : changeDir==='down' ? '#EF4444' : '#64748B',
          }}>
            {changeDir==='up' && <Ic n="arrowUp" size={10} color="#10B981"/>}
            {changeDir==='down' && <Ic n="arrowDown" size={10} color="#EF4444"/>}
            {change}
          </span>
          <span style={{fontSize:11, color:'#64748B'}}>{changeNote}</span>
        </div>
      )}
    </div>
  );
};

                      </td>
                      <td style={{padding:'13px 16px'}}>{statusBadge(a.status)}</td>
                      <td style={{padding:'13px 16px'}}>
                        {a.alerts>0?(
                          <span className="badge" style={{background:a.alerts>=3?'rgba(239,68,68,.15)':'rgba(245,158,11,.15)', color:a.alerts>=3?'#F87171':'#FCD34D'}}>{a.alerts}</span>
                        ):<span style={{color:C.muted,fontSize:12}}>—</span>}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          {/* ── Maintenance ── */}
          <div className="card" style={{padding:20}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
              <div style={{fontSize:13,fontWeight:600,color:C.text}}>Maintenance Schedule</div>
              <button style={{display:'flex',alignItems:'center',gap:5,fontSize:11,fontWeight:600,color:'#10B981',background:'none',border:'none',cursor:'pointer',fontFamily:'Inter'}}>
                <Ic n="calendar" size={12} color="#10B981"/> View All
              </button>
            </div>
            <div style={{display:'grid', gridTemplateColumns:'repeat(5,1fr)', gap:10}}>
              {MX.map(t=>{
                const stColors = {'in-progress':['#FCD34D','rgba(245,158,11,.12)','In Progress'],'urgent':['#F87171','rgba(239,68,68,.12)','Urgent'],'scheduled':['#94A3B8','rgba(148,163,184,.1)','Scheduled']};
                const typeC = {Preventive:'#10B981',Corrective:'#EF4444',Predictive:'#F59E0B'};
                const [sc, sbg, slabel] = stColors[t.st]||stColors.scheduled;
                return (
                  <div key={t.id} style={{background:'rgba(255,255,255,.025)', border:`1px solid ${C.border}`, borderRadius:10, padding:14, display:'flex', flexDirection:'column', gap:8, position:'relative', overflow:'hidden'}}>
                    <div style={{position:'absolute', top:0, left:0, bottom:0, width:3, background:typeC[t.type]}}/>
                    <div style={{marginLeft:8}}>
                      <div style={{fontSize:11,fontWeight:700,color:C.text,marginBottom:3,lineHeight:1.3}}>{t.task}</div>
                      <div style={{fontSize:10,color:C.muted}}>{t.asset}</div>
                    </div>
                    <div style={{marginLeft:8, display:'flex', alignItems:'center', justifyContent:'space-between'}}>
                      <span className="badge" style={{background:sbg,color:sc,fontSize:9}}>{slabel}</span>
                      <span className="tnum" style={{fontSize:10,color:C.muted}}>{t.due}</span>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Footer */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',paddingTop:6,borderTop:`1px solid ${C.border}`}}>
            <span style={{fontSize:10,color:'#334155'}}>EnergyAPM v2.4.1 — Data refreshes every 60s</span>
            <span style={{fontSize:10,color:'#334155'}}>© 2026 EnergyAPM. All rights reserved.</span>
          </div>
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
